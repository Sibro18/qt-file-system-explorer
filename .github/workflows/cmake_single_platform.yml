name: CMake Build, Test and Package

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  BUILD_TYPE: Release

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Qt5 and dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          cmake \
          qtbase5-dev \
          qtbase5-dev-tools

    - name: Configure CMake
      run: |
        cmake -B ${{github.workspace}}/build \
          -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} \
          -DBUILD_TESTS=ON

    - name: Build
      run: cmake --build ${{github.workspace}}/build --config ${{env.BUILD_TYPE}}
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-output
        path: ${{github.workspace}}/build/
        retention-days: 1
  
  test:
	runs-on: ubuntu-latest
	needs: build

	steps:
	  - name: Checkout code
		uses: actions/checkout@v4
	  - name: Install Qt5 runtime
		run: |
		  sudo apt-get update
		  sudo apt-get install -y qtbase5-dev
	  - name: Download build artifacts
		uses: actions/download-artifact@v4
		with:
		  name: build-output
		  path: ${{github.workspace}}/build/

	  - name: Make test binaries executable
		run: chmod +x ${{github.workspace}}/build/tests/test_*

	  - name: Run tests
		working-directory: ${{github.workspace}}/build
		run: ctest -V

  build_deb:
    runs-on: ubuntu-latest
    needs: build

    steps:
    - uses: actions/checkout@v4

    - name: Install packaging dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          cmake \
          qtbase5-dev \
          debhelper \
          dpkg-dev

    - name: Build Debian package
      run: dpkg-buildpackage -us -uc -b

    - name: Upload .deb artifact
      uses: actions/upload-artifact@v4
      with:
        name: debian-package
        path: /home/runner/work/${{github.event.repository.name}}/*.deb
        retention-days: 30
